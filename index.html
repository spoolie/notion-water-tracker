<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Water Tracker</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-sub: #b3b3b3; /* Lighter text color */
            --water-color: #4992ff;
            --water-bg: #f5f9ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Extra small compact card design */
        .tracker-card {
            background: var(--bg-color);
            padding: 16px 14px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 170px; /* Highly compact profile */
            border: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 12px;
        }
        .liters-display {
            font-size: 1.15rem; /* Noticeably smaller */
            font-weight: 500;
            color: var(--text-sub); /* Applied lighter color profile */
            margin: 0;
        }
        .percentage-display {
            font-size: 0.75rem;
            color: #8a8a8a;
            margin: 1px 0 0 0;
        }
        /* Fluid Circle Layout */
        .circle-container {
            position: relative;
            width: 110px; /* Smaller footprint */
            height: 110px;
            margin: 0 auto 12px auto;
            border-radius: 50%;
            background: var(--water-bg);
            overflow: hidden;
            border: 1.5px solid #e1eeff;
            transform: translateZ(0); 
        }
        .wave-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5%; 
            background-color: var(--water-color);
            transform: translate3d(0, 0, 0);
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        /* Dynamic SVG multi-crested wave definitions */
        .wave-wrapper svg {
            position: absolute;
            left: 0;
            width: 400px;
            height: 22px;
        }
        .wave-back {
            top: -14px;
            fill: var(--water-color);
            opacity: 0.4;
            animation: wave-slide 3s linear infinite;
        }
        .wave-front {
            top: -11px;
            fill: var(--water-color);
            animation: wave-slide 1.6s linear infinite;
        }
        @keyframes wave-slide {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-200px, 0, 0); }
        }
        /* Layered transparent canvas overlay for rendering micro bubbles */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        /* Minimalist Button Actions */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        button.add-btn {
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            width: 100%;
        }
        button.add-btn:hover {
            background: #1d4ed8;
        }
        button.add-btn:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
        }
        button.reset-btn {
            background: transparent;
            border: none;
            color: #f43f5e;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 400;
            padding: 2px 8px;
            border-radius: 4px;
        }
        button.reset-btn:hover {
            background: rgba(244, 63, 94, 0.05);
        }
    </style>
</head>
<body>

    <div class="tracker-card">
        <div class="header">
            <div class="liters-display" id="litersText">0 Liters</div>
            <div class="percentage-display" id="percentText">0% Done</div>
        </div>

        <div class="circle-container">
            <div class="wave-wrapper" id="waveFill">
                <!-- Advanced multi-crested choppy sine paths matching Blocs structure -->
                <svg class="wave-back" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,10 Q25,3 50,10 T100,10 T150,10 T200,10 L200,30 L0,30 Z"></path>
                </svg>
                <svg class="wave-front" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,8 Q25,15 50,8 T100,8 T150,8 T200,8 L200,30 L0,30 Z"></path>
                </svg>
                <!-- Canvas component to draw animated fizzy water bubble streams -->
                <canvas id="bubbleCanvas"></canvas>
            </div>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="addButton" onclick="addWater()">+621 ml</button>
            <button class="reset-btn" onclick="resetWater()">Reset</button>
        </div>
    </div>

    <script>
        const INCREMENT = 621;
        const MAX_CLICKS = 4;
        const GOAL = INCREMENT * MAX_CLICKS;

        let currentMl = parseInt(localStorage.getItem('notion_wave_water')) || 0;

        function updateUI() {
            if (currentMl > GOAL) currentMl = GOAL;

            const liters = (currentMl / 1000).toFixed(3);
            const percentage = Math.round((currentMl / GOAL) * 100);

            document.getElementById('litersText').innerText = `${parseFloat(liters)} Liters`;
            document.getElementById('percentText').innerText = `${percentage}% Done`;

            const fillHeight = currentMl === 0 ? 6 : Math.min(6 + (percentage * 0.94), 100);
            document.getElementById('waveFill').style.height = `${fillHeight}%`;

            document.getElementById('addButton').disabled = currentMl >= GOAL;
            localStorage.setItem('notion_wave_water', currentMl);
        }

        function addWater() {
            if (currentMl < GOAL) {
                currentMl += INCREMENT;
                updateUI();
            }
        }

        function resetWater() {
            currentMl = 0;
            updateUI();
        }

        // --- HTML5 Canvas Interactive Bubble Generation Engine ---
        const canvas = document.getElementById('bubbleCanvas');
        const ctx = canvas.getContext('2d');
        let bubbles = [];

        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                // Generate from the bottom floor of container
                this.y = canvas.height + Math.random() * 20; 
                this.radius = Math.random() * 2.5 + 0.5;
                this.speed = Math.random() * 1 + 0.4;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.wobble = Math.random() * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
            }
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.2; // Smooth drifting horizontal drift
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function animateBubbles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Periodically inject new bubbles if water is present
            if (currentMl > 0 && bubbles.length < 18 && Math.random() < 0.1) {
                bubbles.push(new Bubble());
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                bubbles[i].draw();

                // Destroy bubbles when they float past the surface
                if (bubbles[i].y < 15) {
                    bubbles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateBubbles);
        }
        
        // Boot system scripts
        updateUI();
        animateBubbles();
    </script>
</body>
</html>
