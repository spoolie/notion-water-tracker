<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Water Tracker</title>
    <!-- 1. ADDED SUPABASE LIBRARY SOURCE LINK -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #333333;
            --text-sub: #7a7a7a;
            --water-color: #4992ff;
            --water-bg: #f2f7ff;
            --btn-blue-text: #2563eb;
            --btn-blue-bg: #eff6ff;
            --btn-red-text: #e11d48;
            --btn-red-bg: #fff1f2;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .tracker-card {
            background: var(--bg-color);
            padding: 20px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 230px;
            border: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 14px;
        }
        .liters-display {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }
        .percentage-display {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin: 2px 0 0 0;
        }
        .circle-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            background: var(--water-bg);
            overflow: hidden;
            border: 1.5px solid #e1eeff;
            transform: translateZ(0); 
        }
        .wave-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: var(--water-color);
            transform: translate3d(0, 0, 0);
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .wave-wrapper svg {
            position: absolute;
            left: 0;
            width: 400px;
            height: 22px;
        }
        .wave-back {
            top: -14px;
            fill: var(--water-color);
            opacity: 0.45;
            animation: wave-slide 2.8s linear infinite;
        }
        .wave-front {
            top: -11px;
            fill: var(--water-color);
            animation: wave-slide 1.5s linear infinite;
        }
        @keyframes wave-slide {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-200px, 0, 0); }
        }
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        button:active {
            transform: scale(0.97);
        }
        button.add-btn {
            background: var(--btn-blue-bg);
            color: var(--btn-blue-text);
            flex: 2;
        }
        button.add-btn:hover {
            background: #dbeafe;
        }
        button.add-btn:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        button.reset-btn {
            background: var(--btn-red-bg);
            color: var(--btn-red-text);
            flex: 1;
        }
        button.reset-btn:hover {
            background: #ffe4e6;
        }
    </style>
</head>
<body>

    <div class="tracker-card">
        <div class="header">
            <div class="liters-display" id="litersText">0 Liters</div>
            <div class="percentage-display" id="percentText">0% Done</div>
        </div>

        <div class="circle-container">
            <div class="wave-wrapper" id="waveFill">
                <svg class="wave-back" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,10 Q25,3 50,10 T100,10 T150,10 T200,10 L200,30 L0,30 Z"></path>
                </svg>
                <svg class="wave-front" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,8 Q25,15 50,8 T100,8 T150,8 T200,8 L200,30 L0,30 Z"></path>
                </svg>
            </div>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="addButton" onclick="addWater()">+ 621 ml</button>
            <button class="reset-btn" onclick="resetWater()">Reset</button>
        </div>
    </div>

    <script>
        const INCREMENT = 621;
        const MAX_CLICKS = 4;
        const GOAL = INCREMENT * MAX_CLICKS;

        // 2. CONNECTED CLOUD DATABASE SPECIFICATIONS
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_VAUrzcS7gynx6V_kfJLpBQ_XsUgB8Ck";

        // Initialize Supabase Client Connection
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMl = 0;

        // 3. ADDED CLOUD DATA INGESTION ENGINE
        async function fetchWaterProgress() {
            const { data, error } = await supabase
                .from('water_tracking')
                .select('current_ml')
                .eq('id', 1)
                .single();

            if (data) {
                currentMl = data.current_ml;
                updateUI();
            }
        }

        // 4. ADDED CLOUD DATA SYNCHRONIZATION PIPELINE
        async function syncToCloud(newValue) {
            const { error } = await supabase
                .from('water_tracking')
                .update({ current_ml: newValue })
                .eq('id', 1);
            
            if (!error) {
                currentMl = newValue;
                updateUI();
            }
        }

        function updateUI() {
            if (currentMl > GOAL) currentMl = GOAL;

            const liters = (currentMl / 1000).toFixed(3);
            const percentage = Math.round((currentMl / GOAL) * 100);

            document.getElementById('litersText').innerText = `${parseFloat(liters)} Liters`;
            document.getElementById('percentText').innerText = `${percentage}% Done`;

            let fillHeight = percentage;
            if (percentage > 0 && percentage < 100) {
                fillHeight = percentage - 4; 
            }

            document.getElementById('waveFill').style.height = `${fillHeight}%`;
            document.getElementById('addButton').disabled = currentMl >= GOAL;
        }

        function addWater() {
            if (currentMl < GOAL) {
                const targetMl = currentMl + INCREMENT;
                syncToCloud(targetMl); // Replaced local storage with database push
            }
        }

        function resetWater() {
            syncToCloud(0); // Replaced local storage with database push
        }

        // 5. BOOT DEVICE SYNC SYSTEM IMMEDIATE INGESTION
        fetchWaterProgress();
    </script>
</body>
</html>
