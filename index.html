<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Water Tracker</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #000000;
            --text-sub: #7c7c7c;
            --water-color: #5c8df6;
            --water-bg: #f3f3f3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Smaller card dimensions */
        .tracker-card {
            background: var(--bg-color);
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 220px; /* Reduced width */
            border: 1px solid #ededed;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 16px;
        }
        .liters-display {
            font-size: 1.3rem; /* Slightly smaller text */
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }
        .percentage-display {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin: 2px 0 0 0;
        }
        /* Smaller Fluid Circle Container */
        .circle-container {
            position: relative;
            width: 140px; /* Reduced from 190px */
            height: 140px; /* Reduced from 190px */
            margin: 0 auto 16px auto;
            border-radius: 50%;
            background: var(--water-bg);
            overflow: hidden;
            border: 1px solid #f0f0f0;
            /* Fixes overflow bugs on some browsers */
            transform: translateZ(0); 
        }
        .wave-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5%; 
            background-color: var(--water-color);
            /* Hardware acceleration for smooth movement */
            transform: translate3d(0, 0, 0);
            transition: height 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Ultra-smooth looping SVG animations */
        .wave-wrapper svg {
            position: absolute;
            left: 0;
            width: 400px; /* Long enough to cycle endlessly without clipping */
            height: 28px;
            background: transparent;
        }
        .wave-back {
            top: -18px;
            fill: var(--water-color);
            opacity: 0.45;
            /* Slower background wave for depth */
            animation: wave-slide 4s linear infinite;
        }
        .wave-front {
            top: -14px;
            fill: var(--water-color);
            /* Faster foreground wave for dynamic parallax effect */
            animation: wave-slide 2.2s linear infinite;
        }
        /* CSS keyframes targeting transform for 60fps rendering */
        @keyframes wave-slide {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-200px, 0, 0); }
        }
        /* UI Control Layout */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        button.add-btn {
            background: #eef2ff;
            color: #2563eb;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            width: 100%;
        }
        button.add-btn:hover {
            background: #dbeafe;
            transform: scale(1.01);
        }
        button.add-btn:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        button.reset-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 2px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        button.reset-btn:hover {
            background: rgba(239, 68, 68, 0.08);
        }
    </style>
</head>
<body>

    <div class="tracker-card">
        <div class="header">
            <div class="liters-display" id="litersText">0 Liters</div>
            <div class="percentage-display" id="percentText">0% of your goal</div>
        </div>

        <div class="circle-container">
            <div class="wave-wrapper" id="waveFill">
                <!-- Mathematically looping continuous sine wave SVG shapes -->
                <svg class="wave-back" viewBox="0 0 200 28" preserveAspectRatio="none">
                    <path d="M0,15 C30,5 70,25 100,15 C130,5 170,25 200,15 L200,30 L0,30 Z"></path>
                </svg>
                <svg class="wave-front" viewBox="0 0 200 28" preserveAspectRatio="none">
                    <path d="M0,10 C40,25 60,0 100,10 C140,25 160,0 200,10 L200,30 L0,30 Z"></path>
                </svg>
            </div>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="addButton" onclick="addWater()">+621 ml</button>
            <button class="reset-btn" onclick="resetWater()">Reset Progress</button>
        </div>
    </div>

    <script>
        const INCREMENT = 621;
        const MAX_CLICKS = 4;
        const GOAL = INCREMENT * MAX_CLICKS;

        let currentMl = parseInt(localStorage.getItem('notion_wave_water')) || 0;

        function updateUI() {
            if (currentMl > GOAL) currentMl = GOAL;

            const liters = (currentMl / 1000).toFixed(3);
            const percentage = Math.round((currentMl / GOAL) * 100);

            document.getElementById('litersText').innerText = `${parseFloat(liters)} Liters`;
            document.getElementById('percentText').innerText = `${percentage}% of your goal`;

            // Sets height layout constraints
            const fillHeight = currentMl === 0 ? 6 : Math.min(6 + (percentage * 0.94), 100);
            document.getElementById('waveFill').style.height = `${fillHeight}%`;

            document.getElementById('addButton').disabled = currentMl >= GOAL;
            localStorage.setItem('notion_wave_water', currentMl);
        }

        function addWater() {
            if (currentMl < GOAL) {
                currentMl += INCREMENT;
                updateUI();
            }
        }

        function resetWater() {
            currentMl = 0;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
