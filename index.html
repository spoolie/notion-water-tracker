<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Water Tracker</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #333333; /* Darker font color for readability */
            --text-sub: #7a7a7a;
            --water-color: #4992ff;
            --water-bg: #f2f7ff;
            --btn-blue-text: #2563eb;
            --btn-blue-bg: #eff6ff; /* Lighter version of font color */
            --btn-red-text: #e11d48;
            --btn-red-bg: #fff1f2;  /* Lighter version of font color */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* Wider card profile */
        .tracker-card {
            background: var(--bg-color);
            padding: 20px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 230px; /* Increased card width */
            border: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 14px;
        }
        .liters-display {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main); /* Updated to darker font color */
            margin: 0;
        }
        .percentage-display {
            font-size: 0.75rem;
            color: var(--text-sub);
            margin: 2px 0 0 0;
        }
        /* Wave Bowl Container */
        .circle-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 16px auto;
            border-radius: 50%;
            background: var(--water-bg);
            overflow: hidden;
            border: 1.5px solid #e1eeff;
            transform: translateZ(0); 
        }
        .wave-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5%; 
            background-color: var(--water-color);
            transform: translate33d(0, 0, 0);
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .wave-wrapper svg {
            position: absolute;
            left: 0;
            width: 400px;
            height: 22px;
        }
        .wave-back {
            top: -14px;
            fill: var(--water-color);
            opacity: 0.45;
            animation: wave-slide 2.8s linear infinite;
        }
        .wave-front {
            top: -11px;
            fill: var(--water-color);
            animation: wave-slide 1.5s linear infinite;
        }
        @keyframes wave-slide {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-200px, 0, 0); }
        }
        /* Bubble Rendering Layer */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        /* Side-by-Side Action Row */
        .btn-group {
            display: flex;
            gap: 10px; /* Places them cleanly side-by-side */
            width: 100%;
        }
        button {
            border: none;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        button:active {
            transform: scale(0.97);
        }
        /* Smaller +621ml Button with a pastel blue background tint */
        button.add-btn {
            background: var(--btn-blue-bg);
            color: var(--btn-blue-text);
            flex: 2; /* Takes up slightly more space than reset */
        }
        button.add-btn:hover {
            background: #dbeafe;
        }
        button.add-btn:disabled {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        /* Reset Button beside the tracking button with a pastel red background tint */
        button.reset-btn {
            background: var(--btn-red-bg);
            color: var(--btn-red-text);
            flex: 1;
        }
        button.reset-btn:hover {
            background: #ffe4e6;
        }
    </style>
</head>
<body>

    <div class="tracker-card">
        <div class="header">
            <div class="liters-display" id="litersText">0 Liters</div>
            <div class="percentage-display" id="percentText">0% Done</div>
        </div>

        <div class="circle-container">
            <div class="wave-wrapper" id="waveFill">
                <svg class="wave-back" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,10 Q25,3 50,10 T100,10 T150,10 T200,10 L200,30 L0,30 Z"></path>
                </svg>
                <svg class="wave-front" viewBox="0 0 200 22" preserveAspectRatio="none">
                    <path d="M0,8 Q25,15 50,8 T100,8 T150,8 T200,8 L200,30 L0,30 Z"></path>
                </svg>
                <canvas id="bubbleCanvas"></canvas>
            </div>
        </div>

        <div class="btn-group">
            <button class="add-btn" id="addButton" onclick="addWater()">+621 ml</button>
            <button class="reset-btn" onclick="resetWater()">Reset</button>
        </div>
    </div>

    <script>
        const INCREMENT = 621;
        const MAX_CLICKS = 4;
        const GOAL = INCREMENT * MAX_CLICKS;

        let currentMl = parseInt(localStorage.getItem('notion_wave_water')) || 0;

        function updateUI() {
            if (currentMl > GOAL) currentMl = GOAL;

            const liters = (currentMl / 1000).toFixed(3);
            const percentage = Math.round((currentMl / GOAL) * 100);

            document.getElementById('litersText').innerText = `${parseFloat(liters)} Liters`;
            document.getElementById('percentText').innerText = `${percentage}% Done`;

            const fillHeight = currentMl === 0 ? 6 : Math.min(6 + (percentage * 0.94), 100);
            document.getElementById('waveFill').style.height = `${fillHeight}%`;

            document.getElementById('addButton').disabled = currentMl >= GOAL;
            localStorage.setItem('notion_wave_water', currentMl);
        }

        function addWater() {
            if (currentMl < GOAL) {
                currentMl += INCREMENT;
                updateUI();
            }
        }

        function resetWater() {
            currentMl = 0;
            updateUI();
        }

        // --- Optimized High-Visibility Bubble System ---
        const canvas = document.getElementById('bubbleCanvas');
        const ctx = canvas.getContext('2d');
        let bubbles = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        // Initial tiny delay to read exact parent bounding box layout properties cleanly
        setTimeout(resizeCanvas, 50);

        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10; 
                // Increased dimensions for clear visibility
                this.radius = Math.random() * 3.5 + 1.5; 
                this.speed = Math.random() * 0.8 + 0.5;
                // Sharper opacity value
                this.opacity = Math.random() * 0.6 + 0.4; 
                this.wobble = Math.random() * 10;
                this.wobbleSpeed = Math.random() * 0.04 + 0.02;
            }
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.3;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                // Pure crisp white fill to stand out from the bright water color tones
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        function animateBubbles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Constantly inject bubble arrays if user has drunk water
            if (currentMl > 0 && bubbles.length < 25 && Math.random() < 0.15) {
                bubbles.push(new Bubble());
            }

            for (let i = bubbles.length - 1; i >= 0; i--) {
                bubbles[i].update();
                bubbles[i].draw();

                // Clear out arrays as they rise above the water fill area
                if (bubbles[i].y < 10) {
                    bubbles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateBubbles);
        }
        
        updateUI();
        animateBubbles();
    </script>
</body>
</html>
