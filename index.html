<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Water Tracker</title>
    <style>
        :root {
            --bg-color: #191919; /* Matches Notion Dark Mode */
            --card-bg: #202020;
            --text-color: #ffffff;
            --primary-blue: #3b82f6;
            --accent-blue: #60a5fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .tracker-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 280px;
            border: 1px solid #2f2f2f;
        }
        h3 { margin: 0 0 8px 0; font-size: 1.1rem; font-weight: 500; color: #a3a3a3; }
        .progress-circle {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 16px auto;
            border-radius: 50%;
            background: conic-gradient(var(--primary-blue) 0deg, #2d2d2d 0deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.4s ease;
        }
        .progress-circle::before {
            content: "";
            position: absolute;
            width: 116px;
            height: 116px;
            background: var(--card-bg);
            border-radius: 50%;
        }
        .water-value {
            position: relative;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .unit { font-size: 0.9rem; color: #a3a3a3; font-weight: 400; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button {
            background: #2d2d2d;
            border: none;
            color: var(--text-color);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            flex: 1;
        }
        button:hover { background: var(--primary-blue); }
        button.reset { background: transparent; color: #ef4444; flex: none; width: 44px; padding: 10px 0; }
        button.reset:hover { background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="tracker-card">
        <h3>Daily Hydration</h3>
        <div class="progress-circle" id="progressCircle">
            <div class="water-value"><span id="currentOz">0</span><span class="unit"> /64 oz</span></div>
        </div>
        <div class="btn-group">
            <button class="reset" onclick="resetWater()">↺</button>
            <button onclick="addWater(8)">+8 oz</button>
            <button onclick="addWater(16)">+16 oz</button>
        </div>
    </div>

    <script>
        const GOAL = 64;
        let current = parseInt(localStorage.getItem('notion_water_intake')) || 0;

        function updateUI() {
            document.getElementById('currentOz').innerText = current;
            const percentage = Math.min((current / GOAL) * 360, 360);
            document.getElementById('progressCircle').style.background = `conic-gradient(var(--primary-blue) ${percentage}deg, #2d2d2d ${percentage}deg)`;
            localStorage.setItem('notion_water_intake', current);
        }

        function addWater(amount) {
            current += amount;
            updateUI();
        }

        function resetWater() {
            current = 0;
            updateUI();
        }

        // Initialize on load
        updateUI();
    </script>
</body>
</html>
